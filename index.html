<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Caverna de Archavon</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=MedievalSharp&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Cinzel',serif;
background:#000;
color:#f5c76c;
text-align:center;
}

/* fundo mágico */

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle,#00ffff22 1px,transparent 1px);
background-size:50px 50px;
animation:stars 60s linear infinite;
z-index:-2;
}

@keyframes stars{
from{transform:translateY(0)}
to{transform:translateY(-2000px)}
}

/* fogo bordas */

body::after{
content:"";
position:fixed;
inset:0;
pointer-events:none;
box-shadow:
inset 0 0 120px #ff3300,
inset 0 0 200px #ff6600;
animation:fogo 3s infinite alternate;
}

@keyframes fogo{
0%{opacity:.5}
100%{opacity:.9}
}

.container{
max-width:700px;
margin:auto;
padding:20px;
}

.logo{
width:100%;
max-width:420px;
margin-bottom:20px;
box-shadow:0 0 40px #ff6600;
border-radius:12px;
}

h1{
font-family:'MedievalSharp';
letter-spacing:3px;
}

.item{
display:flex;
justify-content:space-between;
align-items:center;
background:#0c0c0c;
border:1px solid #4a2a00;
padding:14px;
margin:10px 0;
border-radius:10px;
}

.nome{
font-size:18px;
}

.counter{
display:flex;
gap:8px;
align-items:center;
}

button{
background:#1b0f05;
color:#ffb347;
border:1px solid #8a4a00;
font-size:18px;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#ff6600;
color:black;
}

input{
width:60px;
font-size:18px;
text-align:center;
background:black;
color:#ffb347;
border:1px solid #8a4a00;
border-radius:6px;
}

/* remove setinhas do input */

input::-webkit-outer-spin-button,
input::-webkit-inner-spin-button{
-webkit-appearance:none;
margin:0;
}

input[type=number]{
-moz-appearance:textfield;
}

.botoes{
margin-top:20px;
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
}

.resultado{
margin-top:20px;
font-size:26px;
color:#ffa500;
text-shadow:0 0 10px #ff6600;
}

@media(max-width:600px){

.item{
flex-direction:column;
gap:10px;
}

}

</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h1>Caverna de Archavon</h1>

<div id="itens"></div>

<div class="botoes">

<button onclick="calcular()">Calcular</button>

<button onclick="salvarVenda()">Salvar Venda</button>

<button onclick="limpar()">Limpar</button>

<button onclick="fimExpediente()">Fim do Expediente</button>

</div>

<div class="resultado" id="resultado">
Valor: R$ 0
</div>

</div>

<script>

const itens=[
{nome:"Elixir da Saciedade",preco:90},
{nome:"Ensopado Fortificante",preco:90},
{nome:"Elixir dos Sonhos",preco:500},
{nome:"Elixir de Limpeza",preco:500}
];

const lista=document.getElementById("itens");

itens.forEach((item,i)=>{

lista.innerHTML+=`

<div class="item">

<div class="nome">
${item.nome} (R$ ${item.preco})
</div>

<div class="counter">

<button onclick="alterar(${i},-1)">-</button>

<input type="number" id="q${i}" value="0">

<button onclick="alterar(${i},1)">+</button>

</div>

</div>

`;

});

function alterar(i,v){

let campo=document.getElementById("q"+i);

let valor=parseInt(campo.value)||0;

valor+=v;

if(valor<0)valor=0;

campo.value=valor;

}

function calcular(){

let total=0;

itens.forEach((item,i)=>{

let q=parseInt(document.getElementById("q"+i).value)||0;

total+=q*item.preco;

});

document.getElementById("resultado").innerText="Valor: R$ "+total.toFixed(2);

window.vendaAtual=total;

}

function salvarVenda(){

if(!window.vendaAtual)return;

let vendas=JSON.parse(localStorage.getItem("vendas")||"[]");

vendas.push(window.vendaAtual);

localStorage.setItem("vendas",JSON.stringify(vendas));

alert("Venda salva!");

}

function limpar(){

itens.forEach((item,i)=>{

document.getElementById("q"+i).value=0;

});

document.getElementById("resultado").innerText="Valor: R$ 0";

}

function fimExpediente(){

let vendas=JSON.parse(localStorage.getItem("vendas")||"[]");

let total=vendas.reduce((a,b)=>a+b,0);

let restaurante=total*0.20;

let repasse=total-restaurante;

alert(

`Total vendido: R$ ${total.toFixed(2)}

Repasse Restaurante (20%): R$ ${restaurante.toFixed(2)}

Valor restante: R$ ${repasse.toFixed(2)}`

);

localStorage.removeItem("vendas");

}

</script>

</body>
</html>
