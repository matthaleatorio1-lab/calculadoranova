<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Caverna de Archavon</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{
color:white;
text-align:center;
overflow-x:hidden;
background:black;
}

/* GALAXIA */

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* CONTAINER */

.container{
width:420px;
margin:auto;
margin-top:60px;
padding:35px;
border-radius:18px;
background:rgba(10,10,20,0.75);
backdrop-filter:blur(6px);
box-shadow:
0 0 25px #6b4cff,
0 0 60px #3a2b80 inset;
}

/* LOGO */

.logo{
width:120px;
margin-bottom:10px;
filter:drop-shadow(0 0 15px #9c7bff);
}

/* TITULO */

h1{
font-size:28px;
color:#d6c8ff;
text-shadow:0 0 15px #7b5cff;
margin-bottom:25px;
}

/* ITENS */

.item{
margin:12px 0;
display:flex;
justify-content:space-between;
align-items:center;
}

.item label{
font-size:15px;
}

.item input{
width:70px;
padding:6px;
border-radius:6px;
border:none;
text-align:center;
}

/* BOTÕES */

button{
margin:6px;
padding:10px 16px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

.calcular{background:#4e6cff;color:white;}
.salvar{background:#2ecc71;color:white;}
.limpar{background:#f1c40f;color:black;}
.fim{background:#e74c3c;color:white;}

/* TOTAL */

.resultado{
margin-top:20px;
font-size:24px;
color:#fff;
text-shadow:0 0 10px #9a84ff;
}

</style>
</head>

<body>

<canvas id="galaxy"></canvas>

<div class="container">

<img class="logo" src="https://cdn-icons-png.flaticon.com/512/616/616490.png">

<h1>Caverna de Archavon</h1>

<div class="item">
<label>Elixir da Saciedade (90)</label>
<input id="i1" type="number" min="0" value="0">
</div>

<div class="item">
<label>Ensopado Fortificante (90)</label>
<input id="i2" type="number" min="0" value="0">
</div>

<div class="item">
<label>Elixir dos Sonhos (500)</label>
<input id="i3" type="number" min="0" value="0">
</div>

<div class="item">
<label>Elixir de Limpeza (500)</label>
<input id="i4" type="number" min="0" value="0">
</div>

<br>

<button class="calcular" onclick="calcular()">Calcular</button>
<button class="salvar" onclick="salvarVenda()">Salvar Venda</button>
<button class="limpar" onclick="limpar()">Limpar</button>
<button class="fim" onclick="fimExpediente()">Fim de Expediente</button>

<div class="resultado">
Valor: <span id="total">0</span>
</div>

</div>

<script>

/* PREÇOS */

const precos=[90,90,500,500]

let totalExpediente=localStorage.getItem("archavon_total")||0
totalExpediente=parseFloat(totalExpediente)

let valorAtual=0

/* CALCULAR */

function calcular(){

let q1=parseInt(i1.value)||0
let q2=parseInt(i2.value)||0
let q3=parseInt(i3.value)||0
let q4=parseInt(i4.value)||0

valorAtual=
(q1*precos[0])+
(q2*precos[1])+
(q3*precos[2])+
(q4*precos[3])

document.getElementById("total").innerText=valorAtual

}

/* SALVAR VENDA */

function salvarVenda(){

if(valorAtual<=0){
alert("Calcule a venda primeiro.")
return
}

totalExpediente+=valorAtual

localStorage.setItem("archavon_total",totalExpediente)

alert("Venda registrada!")

limpar()

}

/* LIMPAR */

function limpar(){

i1.value=0
i2.value=0
i3.value=0
i4.value=0

valorAtual=0
document.getElementById("total").innerText=0

}

/* FIM DO EXPEDIENTE */

function fimExpediente(){

let repasse=totalExpediente*0.20

let canvas=document.createElement("canvas")
canvas.width=700
canvas.height=350
let ctx=canvas.getContext("2d")

ctx.fillStyle="black"
ctx.fillRect(0,0,700,350)

ctx.fillStyle="white"
ctx.font="28px Arial"
ctx.fillText("Caverna de Archavon",240,70)

ctx.font="22px Arial"
ctx.fillText("Total Vendido: "+totalExpediente,230,170)
ctx.fillText("Repasse Restaurante (20%): "+repasse,180,220)

let link=document.createElement("a")
link.download="expediente_archavon.png"
link.href=canvas.toDataURL()
link.click()

localStorage.removeItem("archavon_total")
totalExpediente=0

alert("Expediente encerrado.")

}

/* GALAXIA */

const canvas=document.getElementById("galaxy")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let stars=[]

for(let i=0;i<250;i++){

stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
speed:Math.random()*0.5
})

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"

stars.forEach(s=>{

ctx.beginPath()
ctx.arc(s.x,s.y,s.r,0,Math.PI*2)
ctx.fill()

s.y+=s.speed

if(s.y>canvas.height){
s.y=0
s.x=Math.random()*canvas.width
}

})

requestAnimationFrame(draw)

}

draw()

</script>

</body>
</html>
