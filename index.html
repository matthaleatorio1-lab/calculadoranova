<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Caverna de Archavon</title>

<style>

body{
font-family: Arial;
color:white;
text-align:center;
padding:40px;
background:black;
overflow:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.container{
background:rgba(0,0,0,0.65);
padding:30px;
border-radius:15px;
width:400px;
margin:auto;
box-shadow:0 0 20px #7b5cff;
}

h1{
color:#bbaaff;
text-shadow:0 0 15px #7b5cff;
}

.item{
margin:10px 0;
}

input{
width:60px;
padding:5px;
}

button{
margin:5px;
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.calcular{background:#5a9cff;color:white;}
.salvar{background:#2ecc71;color:white;}
.limpar{background:#f1c40f;}
.fim{background:#e74c3c;color:white;}

.resultado{
font-size:22px;
margin-top:15px;
}

</style>
</head>

<body>

<canvas id="galaxy"></canvas>

<div class="container">

<h1>Caverna de Archavon</h1>

<div class="item">
Elixir da Saciedade (90)  
<input type="number" id="i1" min="0" value="0">
</div>

<div class="item">
Ensopado Fortificante (90)  
<input type="number" id="i2" min="0" value="0">
</div>

<div class="item">
Elixir dos Sonhos (500)  
<input type="number" id="i3" min="0" value="0">
</div>

<div class="item">
Elixir de Limpeza (500)  
<input type="number" id="i4" min="0" value="0">
</div>

<button class="calcular" onclick="calcular()">Calcular</button>
<button class="salvar" onclick="salvarVenda()">Salvar Venda</button>
<button class="limpar" onclick="limpar()">Limpar</button>
<button class="fim" onclick="fimExpediente()">Fim de Expediente</button>

<div class="resultado">
Valor: <span id="total">0</span>
</div>

</div>

<script>

const precos=[90,90,500,500]

let totalExpediente=localStorage.getItem("totalExpediente")||0
totalExpediente=parseFloat(totalExpediente)

let valorAtual=0

function calcular(){

let q1=parseInt(i1.value)||0
let q2=parseInt(i2.value)||0
let q3=parseInt(i3.value)||0
let q4=parseInt(i4.value)||0

valorAtual=
q1*precos[0]+
q2*precos[1]+
q3*precos[2]+
q4*precos[3]

document.getElementById("total").innerText=valorAtual
}

function salvarVenda(){

if(valorAtual<=0){
alert("Calcule a venda primeiro.")
return
}

totalExpediente+=valorAtual
localStorage.setItem("totalExpediente",totalExpediente)

alert("Venda salva!")

limpar()

}

function limpar(){
i1.value=0
i2.value=0
i3.value=0
i4.value=0
document.getElementById("total").innerText=0
valorAtual=0
}

function fimExpediente(){

let repasse=totalExpediente*0.20

let canvas=document.createElement("canvas")
canvas.width=600
canvas.height=300
let ctx=canvas.getContext("2d")

ctx.fillStyle="black"
ctx.fillRect(0,0,600,300)

ctx.fillStyle="white"
ctx.font="26px Arial"
ctx.fillText("Caverna de Archavon",170,60)

ctx.font="20px Arial"
ctx.fillText("Total Vendido: "+totalExpediente,200,150)
ctx.fillText("Repasse Restaurante (20%): "+repasse,150,200)

let link=document.createElement("a")
link.download="expediente.png"
link.href=canvas.toDataURL()
link.click()

totalExpediente=0
localStorage.removeItem("totalExpediente")

alert("Expediente encerrado!")

}

</script>

<script>

const canvas=document.getElementById("galaxy")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let stars=[]

for(let i=0;i<200;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2
})
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"

stars.forEach(s=>{
ctx.beginPath()
ctx.arc(s.x,s.y,s.r,0,Math.PI*2)
ctx.fill()

s.y+=0.2

if(s.y>canvas.height){
s.y=0
}
})

requestAnimationFrame(draw)
}

draw()

</script>

</body>
</html>
