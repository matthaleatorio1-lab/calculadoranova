<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Taverna de Archavon</title>

<style>

body{
margin:0;
background:#020202;
font-family:Georgia,serif;
color:#eee;
text-align:center;
}

/* FUNDO SOMBRIO */

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle,#111,#000);
z-index:-2;
}

/* FOGO NAS BORDAS */

.fire-left,
.fire-right{

position:fixed;
top:0;
width:80px;
height:100%;

background:linear-gradient(
to top,
#ff3c00,
#ff8800,
transparent
);

filter:blur(25px);

animation:fogo 2s infinite alternate;

}

.fire-left{left:0}
.fire-right{right:0}

@keyframes fogo{

0%{opacity:.6}
100%{opacity:1}

}

/* CONTAINER */

.container{

max-width:420px;
margin:auto;
padding:20px;

background:#0b0b0b;

border-radius:12px;

box-shadow:
0 0 30px #ff6a00,
inset 0 0 30px #000;

}

/* LOGO */

.logo{

width:100%;
border-radius:10px;
margin-bottom:20px;

box-shadow:0 0 20px #ff6a00;

}

/* ITENS */

.item{

display:flex;
justify-content:space-between;
align-items:center;

margin:14px 0;

flex-wrap:wrap;

}

/* CONTADOR */

.counter{

display:flex;
align-items:center;
gap:5px;

}

/* INPUT NUMÉRICO */

.counter input{

width:55px;

padding:6px;

text-align:center;

font-size:16px;

background:#111;

border:1px solid #333;

color:white;

border-radius:4px;

}

/* BOTÕES + - */

.counter button{

width:30px;
height:30px;

background:#1a1a1a;

border:none;

color:white;

font-size:18px;

cursor:pointer;

border-radius:4px;

}

/* BOTÕES PRINCIPAIS */

button{

margin:6px;

padding:10px 14px;

border:none;

border-radius:6px;

font-weight:bold;

cursor:pointer;

}

.calc{background:#444}
.save{background:#147a32}
.clear{background:#a67c00}
.end{background:#8b0000}

button:hover{

filter:brightness(1.2)

}

/* TOTAL */

.total{

font-size:24px;

margin-top:18px;

color:#ff8c00;

}

/* VELAS */

.candle{

position:fixed;

bottom:0;

width:40px;

height:110px;

background:#ddd;

border-radius:6px;

}

.candle:before{

content:"";

position:absolute;

top:-22px;

left:12px;

width:14px;

height:24px;

background:orange;

border-radius:50%;

box-shadow:0 0 15px orange;

animation:flame .15s infinite alternate;

}

@keyframes flame{

0%{transform:scale(1)}
100%{transform:scale(1.2)}

}

.c1{left:10px}
.c2{right:10px}

/* CELULAR */

@media(max-width:500px){

.container{

margin:10px;

}

.item span{

width:100%;
margin-bottom:6px;

}

}

</style>
</head>

<body>

<div class="fire-left"></div>
<div class="fire-right"></div>

<div class="candle c1"></div>
<div class="candle c2"></div>

<div class="container">

<img src="logo.png" class="logo">

<h2>Taverna de Archavon</h2>

<div class="item">

<span>Elixir da Saciedade (90)</span>

<div class="counter">

<button onclick="alterar('a',-1)">-</button>

<input id="a" type="number" value="0">

<button onclick="alterar('a',1)">+</button>

</div>

</div>


<div class="item">

<span>Ensopado Fortificante (90)</span>

<div class="counter">

<button onclick="alterar('b',-1)">-</button>

<input id="b" type="number" value="0">

<button onclick="alterar('b',1)">+</button>

</div>

</div>


<div class="item">

<span>Elixir dos Sonhos (500)</span>

<div class="counter">

<button onclick="alterar('c',-1)">-</button>

<input id="c" type="number" value="0">

<button onclick="alterar('c',1)">+</button>

</div>

</div>


<div class="item">

<span>Elixir de Limpeza (500)</span>

<div class="counter">

<button onclick="alterar('d',-1)">-</button>

<input id="d" type="number" value="0">

<button onclick="alterar('d',1)">+</button>

</div>

</div>

<br>

<button class="calc" onclick="calcular()">Calcular</button>

<button class="save" onclick="salvar()">Salvar Venda</button>

<button class="clear" onclick="limpar()">Limpar</button>

<button class="end" onclick="fim()">Fim do Expediente</button>

<div class="total">

Valor: <span id="total">0</span>

</div>

</div>

<script>

const preco={

a:90,
b:90,
c:500,
d:500

}

let vendaAtual=0

let totalDia=localStorage.getItem("archavonTotal")||0

totalDia=parseFloat(totalDia)

/* ALTERAR COM + - */

function alterar(id,val){

let el=document.getElementById(id)

let num=parseInt(el.value)||0

num+=val

if(num<0)num=0

el.value=num

}

/* CALCULAR */

function calcular(){

vendaAtual=

a.value*preco.a+
b.value*preco.b+
c.value*preco.c+
d.value*preco.d

total.innerText=vendaAtual

}

/* SALVAR VENDA */

function salvar(){

if(vendaAtual<=0){

alert("Calcule primeiro")

return

}

totalDia+=vendaAtual

localStorage.setItem("archavonTotal",totalDia)

alert("Venda registrada")

limpar()

}

/* LIMPAR */

function limpar(){

["a","b","c","d"].forEach(id=>{

document.getElementById(id).value=0

})

vendaAtual=0

total.innerText=0

}

/* FIM DO EXPEDIENTE */

function fim(){

let repasse=totalDia*0.20

let canvas=document.createElement("canvas")

canvas.width=600

canvas.height=320

let ctx=canvas.getContext("2d")

ctx.fillStyle="black"

ctx.fillRect(0,0,600,320)

ctx.fillStyle="orange"

ctx.font="30px Georgia"

ctx.fillText("Taverna de Archavon",150,80)

ctx.fillStyle="white"

ctx.font="22px Georgia"

ctx.fillText("Total vendido: "+totalDia,190,170)

ctx.fillText("Repasse (20%): "+repasse,210,210)

let link=document.createElement("a")

link.download="expediente.png"

link.href=canvas.toDataURL()

link.click()

localStorage.removeItem("archavonTotal")

totalDia=0

alert("Expediente encerrado")

}

</script>

</body>
</html>
