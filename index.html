<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Caverna de Archavon</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
background:black;
}

/* fundo galaxia */

.stars{
position:fixed;
width:100%;
height:100%;
background:url("https://raw.githubusercontent.com/VincentGarreau/particles.js/master/demo/media/starfield.png");
animation:space 120s linear infinite;
opacity:0.4;
}

@keyframes space{
from{transform:translateY(0);}
to{transform:translateY(-2000px);}
}

/* calculadora */

.calculadora{
position:relative;
background:rgba(10,10,25,0.9);
padding:30px;
border-radius:15px;
box-shadow:0 0 30px #6a5cff;
width:330px;
backdrop-filter:blur(5px);
}

h1{
text-align:center;
color:#a89bff;
margin-bottom:20px;
}

.item{
display:flex;
justify-content:space-between;
margin:10px 0;
}

input{
width:60px;
background:#000;
color:white;
border:1px solid #555;
border-radius:5px;
text-align:center;
}

.result{
margin-top:20px;
font-size:20px;
text-align:center;
}

button{
width:100%;
margin-top:10px;
padding:10px;
border:none;
border-radius:8px;
background:#5b4cff;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#7c6cff;
}

.fim{
background:#8b0000;
}

.limpar{
background:#333;
}

</style>
</head>

<body>

<div class="stars"></div>

<div class="calculadora">

<h1>Caverna de Archavon</h1>

<div class="item">
Elixir da Saciedade (90)
<input type="number" id="i1" value="0">
</div>

<div class="item">
Ensopado Fortificante (90)
<input type="number" id="i2" value="0">
</div>

<div class="item">
Elixir dos Sonhos (500)
<input type="number" id="i3" value="0">
</div>

<div class="item">
Elixir de Limpeza (500)
<input type="number" id="i4" value="0">
</div>

<div class="result">
Total a Cobrar: <span id="total">0</span>
</div>

<button onclick="calcular()">Calcular</button>
<button class="limpar" onclick="limpar()">Limpar</button>
<button class="fim" onclick="fimExpediente()">Fim de Expediente</button>

</div>

<script>

let totalDia = localStorage.getItem("archavon_total") 
? parseFloat(localStorage.getItem("archavon_total")) 
: 0

function salvar(){
localStorage.setItem("archavon_total", totalDia)
}

function calcular(){

let i1 = document.getElementById("i1").value * 90
let i2 = document.getElementById("i2").value * 90
let i3 = document.getElementById("i3").value * 500
let i4 = document.getElementById("i4").value * 500

let total = i1+i2+i3+i4

document.getElementById("total").innerText = total

totalDia += total

salvar()

}

function limpar(){

document.getElementById("i1").value=0
document.getElementById("i2").value=0
document.getElementById("i3").value=0
document.getElementById("i4").value=0

document.getElementById("total").innerText=0

}

function fimExpediente(){

let repasse = totalDia * 0.20
let lucro = totalDia - repasse

let canvas = document.createElement("canvas")
canvas.width=450
canvas.height=260

let ctx = canvas.getContext("2d")

ctx.fillStyle="#0b0b12"
ctx.fillRect(0,0,450,260)

ctx.fillStyle="#ffffff"
ctx.font="24px Arial"
ctx.fillText("Caverna de Archavon",120,50)

ctx.font="18px Arial"
ctx.fillText("Total de Vendas: "+totalDia,120,120)
ctx.fillText("Repasse Restaurante (20%): "+repasse.toFixed(0),80,170)
ctx.fillText("Valor Final: "+lucro.toFixed(0),140,210)

let link = document.createElement("a")
link.download="fechamento-expediente.png"
link.href = canvas.toDataURL()
link.click()

totalDia = 0

localStorage.removeItem("archavon_total")

limpar()

}

</script>

</body>
</html>
