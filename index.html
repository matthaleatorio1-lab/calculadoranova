<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Caverna de Archavon</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Cinzel',serif;
background:black;
color:white;
text-align:center;
overflow-x:hidden;
}

/* fundo galáxia */

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(white 1px,transparent 1px),
radial-gradient(white 1px,transparent 1px),
radial-gradient(white 2px,transparent 2px);
background-size:50px 50px,100px 100px,150px 150px;
opacity:0.15;
animation:stars 60s linear infinite;
}

@keyframes stars{
from{transform:translateY(0)}
to{transform:translateY(-2000px)}
}

/* fogo nas bordas */

body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
box-shadow:
inset 0 0 60px #ff3300,
inset 0 0 120px #ff5500,
inset 0 0 200px #ff2200;
animation:fogo 2s infinite alternate;
}

@keyframes fogo{
from{opacity:0.7}
to{opacity:1}
}

.container{
max-width:500px;
margin:auto;
padding:20px;
}

.logo{
width:150px;
margin-top:20px;
}

h1{
font-size:32px;
margin-bottom:30px;
}

/* itens */

.item{
display:flex;
justify-content:space-between;
align-items:center;
background:#111;
padding:10px;
margin:10px 0;
border-radius:10px;
}

.item span{
font-size:14px;
}

.controls{
display:flex;
align-items:center;
}

button{
background:#222;
color:white;
border:none;
padding:8px 12px;
font-size:16px;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#444;
}

input{
width:50px;
text-align:center;
font-size:16px;
margin:0 5px;
background:black;
color:white;
border:1px solid #444;
border-radius:5px;
}

/* botões principais */

.actions button{
width:100%;
margin:8px 0;
padding:12px;
font-size:16px;
border-radius:8px;
}

.calcular{background:#3a3aff}
.salvar{background:#0a8f2a}
.limpar{background:#666}
.fim{background:#8b0000}

.total{
font-size:28px;
margin:20px 0;
}

/* celular */

@media(max-width:600px){

.container{
padding:15px;
}

h1{
font-size:24px;
}

}

</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h1>Caverna de Archavon</h1>

<div id="itens"></div>

<div class="total">
Total: R$ <span id="total">0</span>
</div>

<div class="actions">

<button class="calcular" onclick="calcular()">Calcular</button>

<button class="salvar" onclick="salvarVenda()">Salvar Venda</button>

<button class="limpar" onclick="limpar()">Limpar</button>

<button class="fim" onclick="fimExpediente()">Fim de Expediente</button>

</div>

</div>

<script>

const produtos=[
{nome:"Elixir da Saciedade",preco:90},
{nome:"Ensopado Fortificante",preco:90},
{nome:"Elixir dos Sonhos",preco:500},
{nome:"Elixir de Limpeza",preco:500}
]

const container=document.getElementById("itens")

produtos.forEach((p,i)=>{

container.innerHTML+=`
<div class="item">

<span>${p.nome} (${p.preco})</span>

<div class="controls">

<button onclick="menos(${i})">-</button>

<input id="q${i}" type="number" value="0" min="0">

<button onclick="mais(${i})">+</button>

</div>

</div>
`

})

function mais(i){
let el=document.getElementById("q"+i)
el.value=parseInt(el.value)+1
}

function menos(i){
let el=document.getElementById("q"+i)
if(el.value>0)el.value=parseInt(el.value)-1
}

function calcular(){

let total=0

produtos.forEach((p,i)=>{

let q=parseInt(document.getElementById("q"+i).value)||0

total+=q*p.preco

})

document.getElementById("total").innerText=total.toFixed(2)

}

function limpar(){

produtos.forEach((p,i)=>{

document.getElementById("q"+i).value=0

})

document.getElementById("total").innerText="0"

}

function salvarVenda(){

let total=parseFloat(document.getElementById("total").innerText)

if(total<=0){
alert("Calcule a venda primeiro.")
return
}

let vendas=JSON.parse(localStorage.getItem("vendas")||"[]")

vendas.push(total)

localStorage.setItem("vendas",JSON.stringify(vendas))

alert("Venda salva!")

limpar()

}

function fimExpediente(){

let vendas=JSON.parse(localStorage.getItem("vendas")||"[]")

let total=vendas.reduce((a,b)=>a+b,0)

if(total===0){
alert("Nenhuma venda registrada.")
return
}

let restaurante=total*0.20

let canvas=document.createElement("canvas")

canvas.width=700
canvas.height=400

let ctx=canvas.getContext("2d")

ctx.fillStyle="#000"
ctx.fillRect(0,0,700,400)

ctx.fillStyle="#ff9900"
ctx.font="40px Cinzel"
ctx.textAlign="center"
ctx.fillText("Caverna de Archavon",350,80)

ctx.fillStyle="white"
ctx.font="28px Cinzel"

ctx.fillText("Total vendido: R$ "+total.toFixed(2),350,200)

ctx.fillText("Repasse Restaurante: R$ "+restaurante.toFixed(2),350,260)

let data=new Date().toLocaleDateString()

ctx.font="20px Cinzel"

ctx.fillText("Expediente: "+data,350,320)

let link=document.createElement("a")

link.download="expediente-archavon.png"

link.href=canvas.toDataURL()

link.click()

localStorage.removeItem("vendas")

alert("Expediente finalizado!")

}

</script>

</body>
</html>
