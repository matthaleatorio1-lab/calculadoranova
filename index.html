<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Taverna de Archavon</title>

<style>

body{
margin:0;
background:#020202;
font-family:Georgia,serif;
color:#eee;
text-align:center;
overflow-x:hidden;
}

/* NEVOA */

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at center,#111 0%,#000 70%);
opacity:0.9;
z-index:-2;
}

/* FOGO NAS BORDAS */

.fire-left,
.fire-right{
position:fixed;
top:0;
width:120px;
height:100%;
pointer-events:none;
background:linear-gradient(
to top,
#ff4d00,
#ff9900,
transparent
);
filter:blur(25px);
animation:fogo 2s infinite alternate;
}

.fire-left{left:0;}
.fire-right{right:0;}

@keyframes fogo{
0%{opacity:0.6}
100%{opacity:1}
}

/* CONTAINER */

.container{
width:430px;
margin:auto;
margin-top:40px;
background:#0b0b0b;
padding:25px;
border-radius:12px;

box-shadow:
0 0 30px #ff6a00,
inset 0 0 40px #000;
}

/* LOGO */

.logo{
width:100%;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 0 25px #ff6a00;
}

/* ITENS */

.item{
display:flex;
justify-content:space-between;
align-items:center;
margin:14px 0;
}

/* CONTADOR */

.counter{
display:flex;
align-items:center;
}

.counter button{
width:32px;
height:32px;
font-size:18px;
background:#1a1a1a;
border:none;
color:white;
cursor:pointer;
}

.counter span{
width:40px;
display:inline-block;
font-size:18px;
}

/* BOTÕES */

button{
margin:6px;
padding:10px 14px;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.calc{background:#444;}
.save{background:#147a32;}
.clear{background:#a67c00;}
.end{background:#8b0000;}

button:hover{
filter:brightness(1.2);
}

/* TOTAL */

.total{
font-size:26px;
margin-top:18px;
color:#ff8c00;
}

/* VELAS */

.candle{
position:fixed;
bottom:0;
width:60px;
height:140px;
background:#ddd;
border-radius:6px;
}

.candle:before{
content:"";
position:absolute;
top:-25px;
left:22px;
width:16px;
height:26px;
background:orange;
border-radius:50%;
box-shadow:0 0 15px orange;
animation:flame .15s infinite alternate;
}

@keyframes flame{
0%{transform:scale(1)}
100%{transform:scale(1.2)}
}

.c1{left:40px}
.c2{right:40px}

</style>
</head>

<body>

<div class="fire-left"></div>
<div class="fire-right"></div>

<div class="candle c1"></div>
<div class="candle c2"></div>

<div class="container">

<img src="logo.png" class="logo">

<h2>Taverna de Archavon</h2>

<div class="item">
<span>Elixir da Saciedade (90)</span>
<div class="counter">
<button onclick="change('a',-1)">-</button>
<span id="a">0</span>
<button onclick="change('a',1)">+</button>
</div>
</div>

<div class="item">
<span>Ensopado Fortificante (90)</span>
<div class="counter">
<button onclick="change('b',-1)">-</button>
<span id="b">0</span>
<button onclick="change('b',1)">+</button>
</div>
</div>

<div class="item">
<span>Elixir dos Sonhos (500)</span>
<div class="counter">
<button onclick="change('c',-1)">-</button>
<span id="c">0</span>
<button onclick="change('c',1)">+</button>
</div>
</div>

<div class="item">
<span>Elixir de Limpeza (500)</span>
<div class="counter">
<button onclick="change('d',-1)">-</button>
<span id="d">0</span>
<button onclick="change('d',1)">+</button>
</div>
</div>

<br>

<button class="calc" onclick="calcular()">Calcular</button>
<button class="save" onclick="salvar()">Salvar Venda</button>
<button class="clear" onclick="limpar()">Limpar</button>
<button class="end" onclick="fim()">Fim do Expediente</button>

<div class="total">
Valor: <span id="total">0</span>
</div>

</div>

<script>

const price={
a:90,
b:90,
c:500,
d:500
}

let vendaAtual=0
let totalDia=localStorage.getItem("archavonTotal")||0
totalDia=parseFloat(totalDia)

function change(id,val){

let el=document.getElementById(id)
let num=parseInt(el.innerText)

num+=val
if(num<0)num=0

el.innerText=num

}

function calcular(){

vendaAtual=
a.innerText*price.a+
b.innerText*price.b+
c.innerText*price.c+
d.innerText*price.d

total.innerText=vendaAtual

}

function salvar(){

if(vendaAtual<=0){
alert("Calcule primeiro")
return
}

totalDia+=vendaAtual

localStorage.setItem("archavonTotal",totalDia)

alert("Venda registrada")

limpar()

}

function limpar(){

["a","b","c","d"].forEach(id=>{
document.getElementById(id).innerText=0
})

vendaAtual=0
total.innerText=0

}

function fim(){

let repasse=totalDia*0.20

let canvas=document.createElement("canvas")
canvas.width=600
canvas.height=320

let ctx=canvas.getContext("2d")

ctx.fillStyle="black"
ctx.fillRect(0,0,600,320)

ctx.fillStyle="orange"
ctx.font="30px Georgia"
ctx.fillText("Taverna de Archavon",150,80)

ctx.fillStyle="white"
ctx.font="22px Georgia"
ctx.fillText("Total vendido: "+totalDia,190,170)
ctx.fillText("Repasse (20%): "+repasse,210,210)

let link=document.createElement("a")
link.download="expediente.png"
link.href=canvas.toDataURL()
link.click()

localStorage.removeItem("archavonTotal")
totalDia=0

alert("Expediente encerrado")

}

</script>

</body>
</html>
