<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Caverna de Archavon</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Cinzel', serif;
color:white;
text-align:center;
background:black;
overflow-x:hidden;
}

/* GALAXIA FUNDO */

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at 20% 30%, rgba(255,0,100,.3), transparent),
radial-gradient(circle at 80% 70%, rgba(0,0,255,.3), transparent),
radial-gradient(circle at 50% 50%, rgba(255,255,255,.1), transparent);
animation:galaxy 20s infinite linear;
z-index:-2;
}

@keyframes galaxy{
0%{transform:scale(1)}
50%{transform:scale(1.2)}
100%{transform:scale(1)}
}

/* FOGO BORDA */

body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
box-shadow:
0 0 80px 30px red inset,
0 0 120px 60px orange inset;
opacity:.5;
z-index:-1;
}

/* CONTAINER */

.container{
max-width:500px;
margin:auto;
padding:20px;
}

/* LOGO */

.logo img{
width:120px;
height:auto;
margin-bottom:10px;
filter:drop-shadow(0 0 10px red);
}

/* TITULO */

h1{
margin-top:0;
font-size:28px;
text-shadow:0 0 15px red;
}

/* ITENS */

.item{
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,.6);
border:1px solid red;
border-radius:10px;
padding:10px;
margin:8px 0;
}

/* CONTADOR */

.controls{
display:flex;
align-items:center;
gap:5px;
}

.controls button{
background:#300;
border:none;
color:white;
font-size:18px;
padding:5px 10px;
cursor:pointer;
}

.controls input{
width:60px;
text-align:center;
font-size:16px;
background:black;
color:white;
border:1px solid red;
}

/* remover setas input */

input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{
-webkit-appearance:none;
margin:0;
}

input[type=number]{
-moz-appearance:textfield;
}

/* BOTÕES */

button.main{
width:100%;
margin-top:10px;
padding:12px;
font-size:16px;
background:#400;
border:none;
color:white;
cursor:pointer;
}

button.main:hover{
background:#700;
}

/* TOTAL */

.total{
margin-top:20px;
font-size:22px;
color:#ffcc00;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
<img src="logo.png">
</div>

<h1>Caverna de Archavon</h1>

<div id="items"></div>

<div class="total">
Total a cobrar: <span id="total">0</span>
</div>

<button class="main" onclick="calcular()">Calcular</button>

<button class="main" onclick="salvarVenda()">Salvar Venda</button>

<button class="main" onclick="limpar()">Limpar</button>

<button class="main" onclick="fimExpediente()">Fim de Expediente</button>

</div>

<script>

const itens = [
{name:"Elixir da Saciedade",preco:90},
{name:"Ensopado Fortificante",preco:90},
{name:"Elixir dos Sonhos",preco:500},
{name:"Elixir de Limpeza",preco:500}
]

const container = document.getElementById("items")

itens.forEach((item,i)=>{

const div=document.createElement("div")
div.className="item"

div.innerHTML=`
<span>${item.name} (${item.preco})</span>

<div class="controls">
<button onclick="menos(${i})">-</button>
<input type="number" id="q${i}" value="0">
<button onclick="mais(${i})">+</button>
</div>
`

container.appendChild(div)

})

function mais(i){
let input=document.getElementById("q"+i)
input.value=parseInt(input.value||0)+1
}

function menos(i){
let input=document.getElementById("q"+i)
input.value=Math.max(0,parseInt(input.value||0)-1)
}

function calcular(){

let total=0

itens.forEach((item,i)=>{

let q=parseInt(document.getElementById("q"+i).value)||0

total+=q*item.preco

})

document.getElementById("total").innerText=total

return total

}

function salvarVenda(){

let total=calcular()

let vendas=JSON.parse(localStorage.getItem("vendas")||"[]")

vendas.push(total)

localStorage.setItem("vendas",JSON.stringify(vendas))

limpar()

}

function limpar(){

itens.forEach((item,i)=>{

document.getElementById("q"+i).value=0

})

document.getElementById("total").innerText=0

}

function fimExpediente(){

let vendas=JSON.parse(localStorage.getItem("vendas")||"[]")

let total=vendas.reduce((a,b)=>a+b,0)

let repasse=total*0.2

let canvas=document.createElement("canvas")
canvas.width=800
canvas.height=400

let ctx=canvas.getContext("2d")

ctx.fillStyle="black"
ctx.fillRect(0,0,800,400)

ctx.fillStyle="red"
ctx.font="40px Cinzel"
ctx.fillText("Caverna de Archavon",200,80)

ctx.fillStyle="white"
ctx.font="28px Cinzel"

ctx.fillText("Total vendido: "+total,200,200)
ctx.fillText("Repasse restaurante (20%): "+repasse,200,260)

let link=document.createElement("a")
link.download="expediente.png"
link.href=canvas.toDataURL()
link.click()

localStorage.removeItem("vendas")

}

</script>

</body>
</html>
