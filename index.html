<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Caverna de Archavon</title>

<style>
body{
background:#0b0b12;
color:#e6e6ff;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.calculadora{
background:#111122;
padding:30px;
border-radius:15px;
box-shadow:0 0 20px #5a5aff;
width:320px;
}

h1{
text-align:center;
color:#9d8cff;
margin-bottom:20px;
}

.item{
display:flex;
justify-content:space-between;
margin:10px 0;
}

input{
width:60px;
background:#000;
color:white;
border:1px solid #555;
border-radius:5px;
text-align:center;
}

.result{
margin-top:15px;
font-size:18px;
}

button{
width:100%;
margin-top:10px;
padding:10px;
border:none;
border-radius:8px;
background:#4b3cff;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#6d5cff;
}

.fim{
background:#8b0000;
}

.limpar{
background:#333;
}
</style>
</head>

<body>

<div class="calculadora">

<h1>Caverna de Archavon</h1>

<div class="item">
Elixir da Saciedade (90)
<input type="number" id="i1" value="0">
</div>

<div class="item">
Ensopado Fortificante (90)
<input type="number" id="i2" value="0">
</div>

<div class="item">
Elixir dos Sonhos (500)
<input type="number" id="i3" value="0">
</div>

<div class="item">
Elixir de Limpeza (500)
<input type="number" id="i4" value="0">
</div>

<div class="result">
Total: <span id="total">0</span>
</div>

<div class="result">
Repasse Restaurante (20%): <span id="repasse">0</span>
</div>

<div class="result">
Seu Lucro: <span id="lucro">0</span>
</div>

<button onclick="calcular()">Calcular</button>
<button class="limpar" onclick="limpar()">Limpar</button>
<button class="fim" onclick="fimExpediente()">Fim de Expediente</button>

</div>

<script>

function calcular(){

let i1 = document.getElementById("i1").value * 90
let i2 = document.getElementById("i2").value * 90
let i3 = document.getElementById("i3").value * 500
let i4 = document.getElementById("i4").value * 500

let total = i1+i2+i3+i4
let repasse = total * 0.20
let lucro = total - repasse

document.getElementById("total").innerText = total
document.getElementById("repasse").innerText = repasse.toFixed(0)
document.getElementById("lucro").innerText = lucro.toFixed(0)

}

function limpar(){

document.getElementById("i1").value=0
document.getElementById("i2").value=0
document.getElementById("i3").value=0
document.getElementById("i4").value=0

document.getElementById("total").innerText=0
document.getElementById("repasse").innerText=0
document.getElementById("lucro").innerText=0

}

function fimExpediente(){

let total = document.getElementById("total").innerText
let repasse = document.getElementById("repasse").innerText

let canvas = document.createElement("canvas")
canvas.width=400
canvas.height=200

let ctx = canvas.getContext("2d")

ctx.fillStyle="#0b0b12"
ctx.fillRect(0,0,400,200)

ctx.fillStyle="#ffffff"
ctx.font="20px Arial"
ctx.fillText("Caverna de Archavon",90,40)

ctx.font="18px Arial"
ctx.fillText("Total de Vendas: "+total,80,100)
ctx.fillText("Repasse Restaurante: "+repasse,60,140)

let link = document.createElement("a")
link.download="fechamento.png"
link.href = canvas.toDataURL()
link.click()

limpar()

}

</script>

</body>
</html>
